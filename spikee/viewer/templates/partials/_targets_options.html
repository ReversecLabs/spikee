{# partials/_targets_options.html
   <option>/<optgroup> elements for the target <select>.
   Expects: targets — {local: [{name, tags}], builtin: [...]}
#}
<option value="" disabled selected>&mdash; select a target &mdash;</option>
{% if targets.local %}
<optgroup label="Local">
    {% for t in targets.local %}
    <option value="{{ t.name }}">{{ t.name }}{% if t.tags %} ({% for tag in t.tags %}{{ tag.label }}{% if not loop.last %}, {% endif %}{% endfor %}){% endif %}</option>
    {% endfor %}
</optgroup>
{% endif %}
{% if targets.builtin %}
<optgroup label="Built-in">
    {% for t in targets.builtin %}
    <option value="{{ t.name }}">{{ t.name }}{% if t.tags %} ({% for tag in t.tags %}{{ tag.label }}{% if not loop.last %}, {% endif %}{% endfor %}){% endif %}</option>
    {% endfor %}
</optgroup>
{% endif %}
